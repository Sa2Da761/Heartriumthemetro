<!DOCTYPE html>

<meta charset="UTF-8">

<title>제안서 다운로드</title>

<style>
body {
    font-family: 'Noto Sans KR', sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:15px;
}

/* 전체 최대폭 제한 (모바일 기준 핵심) */
.container {
    max-width:500px;
    margin:0 auto;
}

/* PC에서는 넓게 */
@media (min-width:768px) {
    .container {
        max-width:900px;
    }
}

h1 {
    text-align:center;
    font-size:20px;
}

.sub {
    text-align:center;
    font-size:13px;
    color:#666;
    margin-bottom:20px;
}

.section {
    margin-top:25px;
}

.section h2 {
    font-size:16px;
    margin-bottom:10px;
    color:#1e2a5a;
}

/* 카드 */
.card {
    background:white;
    padding:12px 15px;
    margin-bottom:8px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* 이름 */
.title {
    font-size:14px;
    font-weight:600;
}

/* 버튼 */
.btn {
    background:#1e2a5a;
    color:white;
    padding:6px 12px;
    border-radius:6px;
    text-decoration:none;
    font-size:12px;
    white-space:nowrap;
}

.btn:hover {
    background:#2f3d7a;
}

/* PC에서 살짝 업그레이드 */
@media (min-width:768px) {
    .card {
        padding:15px 20px;
    }
    .title {
        font-size:16px;
    }
    .btn {
        font-size:13px;
        padding:8px 14px;
    }
}
</style>
</head>
